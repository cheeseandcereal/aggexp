apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          # ${AGGEXP_IMAGE} is substituted by hack/deploy.sh via envsubst.
          # GNU envsubst does not honor ${VAR:-default}, so deploy.sh must
          # export AGGEXP_IMAGE (defaulting to aggexp:dev) before rendering.
          # `kind load docker-image aggexp:dev` works out of the box with
          # the default.
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
