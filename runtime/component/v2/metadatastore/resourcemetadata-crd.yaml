apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcemetadatas.aggexpmeta.aggexp.io
spec:
  group: aggexpmeta.aggexp.io
  scope: Cluster
  names:
    kind: ResourceMetadata
    plural: resourcemetadatas
    singular: resourcemetadata
    shortNames:
      - rmeta
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [resourceRef]
              properties:
                resourceRef:
                  type: object
                  required: [group, resource, name]
                  properties:
                    group:
                      type: string
                    resource:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                metadata:
                  type: object
                  description: |
                    The stitched KRM-metadata overlay. Keys here mirror
                    metav1.ObjectMeta fields. `managedFields` and
                    `ownerReferences` are persisted as embedded JSON strings
                    to avoid metav1 version coupling at CRD definition time.
                  properties:
                    uid:
                      type: string
                    creationTimestamp:
                      type: string
                    deletionTimestamp:
                      type: string
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                    finalizers:
                      type: array
                      items:
                        type: string
                    managedFields:
                      type: string
                      description: JSON-encoded []metav1.ManagedFieldsEntry
                    ownerReferences:
                      type: string
                      description: JSON-encoded []metav1.OwnerReference
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.resourceRef.group
        - name: Resource
          type: string
          jsonPath: .spec.resourceRef.resource
        - name: Namespace
          type: string
          jsonPath: .spec.resourceRef.namespace
        - name: Name
          type: string
          jsonPath: .spec.resourceRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
