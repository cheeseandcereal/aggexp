apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apidefinitions.aggexp.io
spec:
  group: aggexp.io
  scope: Cluster
  names:
    kind: APIDefinition
    plural: apidefinitions
    singular: apidefinition
    shortNames:
      - apidef
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [group, version, kind, plural, singular, backend]
              properties:
                group:
                  type: string
                version:
                  type: string
                kind:
                  type: string
                plural:
                  type: string
                singular:
                  type: string
                scope:
                  type: string
                  enum: ["Namespaced", "Cluster"]
                  default: "Namespaced"
                schemaSource:
                  type: string
                  enum: ["backendJSONSchema", "configEmbedded"]
                  default: "backendJSONSchema"
                schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                backend:
                  type: object
                  required: [address]
                  properties:
                    transport:
                      type: string
                      enum: ["http", "grpc"]
                      default: "http"
                    address:
                      type: string
                watchCapability:
                  type: string
                  enum: ["poll", "push", "both", ""]
                admission:
                  type: object
                  properties:
                    mutations:
                      type: array
                      items:
                        type: object
                        required: [jsonPath, op]
                        properties:
                          jsonPath:
                            type: string
                          op:
                            type: string
                            enum: ["set", "default"]
                          value:
                            x-kubernetes-preserve-unknown-fields: true
                          operations:
                            type: array
                            items:
                              type: string
                    validations:
                      type: array
                      items:
                        type: object
                        required: [expression, message]
                        properties:
                          expression:
                            type: string
                          message:
                            type: string
                          fieldPath:
                            type: string
                          operations:
                            type: array
                            items:
                              type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                registeredAPIService:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                      observedGeneration:
                        type: integer
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.group
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
