apiVersion: apps/v1
kind: Deployment
metadata:
  name: note-backend
  namespace: aggexp-system
  labels:
    app: note-backend
    variant: push
spec:
  replicas: 1
  selector:
    matchLabels:
      app: note-backend
  template:
    metadata:
      labels:
        app: note-backend
        variant: push
    spec:
      containers:
        - name: note-backend
          image: ${NOTE_BACKEND_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --addr=0.0.0.0:9090
            - --enable-event-generator=${ENABLE_EVENT_GENERATOR}
            - --generator-namespace=default
          ports:
            - name: grpc
              containerPort: 9090
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: note-backend
  namespace: aggexp-system
spec:
  selector:
    app: note-backend
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
