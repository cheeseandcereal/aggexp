apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
    variant: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
        variant: poll
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
            - --enable-priority-and-fairness=false
            - --backend-addr=note-backend.aggexp-system.svc:9090
            - --backend-timeout=20s
            - --poll-interval=${POLL_INTERVAL}
            - --v=2
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
