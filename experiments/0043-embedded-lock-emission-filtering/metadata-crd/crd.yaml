# Metadata CRD for experiment 0043 — cluster-scoped, in a DEDICATED
# group (widgetmeta.aggexp.io) distinct from the served group
# (aggexp.io). An APIService claims an entire group/version, so the
# metadata CRD cannot live in the served group. One instance per
# served Widget; carries the KRM metadata overlay PLUS (0043) an
# embedded per-object lock (spec.lock) and an observed body hash
# (spec.observed.bodyHash). The business body (spec+status) itself
# lives on the shared body CRD (widgetbodies.widgetbody.aggexp.io),
# never here.
#
# The metadata CR's own metadata.resourceVersion (host etcd RV) is
# the single RV authority for the stitched Widget across Get, List,
# and Watch in every replica — and ALSO the CAS surface for the
# embedded lock (0043). Lock acquire/release/renewal write this CR
# and advance its RV ("lock churn"); the emission filter keeps that
# churn invisible to watchers.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcemetadatas.widgetmeta.aggexp.io
spec:
  group: widgetmeta.aggexp.io
  scope: Cluster
  names:
    kind: ResourceMetadata
    listKind: ResourceMetadataList
    singular: resourcemetadata
    plural: resourcemetadatas
    shortNames: ["rmeta"]
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            ResourceMetadata holds KRM metadata (uid, creationTimestamp,
            deletionTimestamp, labels, annotations, finalizers,
            managedFields, ownerReferences) that experiment 0042's
            aggregated apiserver stitches onto backend-provided
            business data on every response. The metadata CR's own
            resourceVersion is the authoritative RV of the stitched
            object.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: ["resourceRef"]
              properties:
                resourceRef:
                  type: object
                  required: ["group", "resource", "name"]
                  properties:
                    group:
                      type: string
                    resource:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                metadata:
                  type: object
                  properties:
                    uid:
                      type: string
                    creationTimestamp:
                      type: string
                      format: date-time
                    deletionTimestamp:
                      type: string
                      format: date-time
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                    finalizers:
                      type: array
                      items:
                        type: string
                    managedFields:
                      type: string
                    ownerReferences:
                      type: string
                # observed (0043): server-recorded watcher-visible state.
                # bodyHash is the sha256 of the body the AA last wrote;
                # the emission filter compares it (plus the served KRM
                # metadata) to decide whether a CR transition is
                # watcher-visible.
                observed:
                  type: object
                  properties:
                    bodyHash:
                      type: string
                # lock (0043): the embedded per-object write lock,
                # CAS'd on this CR's own resourceVersion. Replaces the
                # separate Lease (0032) / lock CR (0033). When
                # holderIdentity is empty the lock is free.
                lock:
                  type: object
                  properties:
                    holderIdentity:
                      type: string
                    acquiredAt:
                      type: string
                      format: date-time
                    renewedAt:
                      type: string
                      format: date-time
                    leaseDurationSeconds:
                      type: integer
                      format: int32
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.resourceRef.group
        - name: Resource
          type: string
          jsonPath: .spec.resourceRef.resource
        - name: Namespace
          type: string
          jsonPath: .spec.resourceRef.namespace
        - name: Name
          type: string
          jsonPath: .spec.resourceRef.name
        - name: UID
          type: string
          jsonPath: .spec.metadata.uid
        - name: Lock
          type: string
          jsonPath: .spec.lock.holderIdentity
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
