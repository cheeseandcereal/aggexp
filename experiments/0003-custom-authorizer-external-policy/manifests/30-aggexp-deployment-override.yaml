# Deployment overlay for experiment 0003 (custom-authorizer-external-policy).
# The base manifests in deploy/manifests/ provide the namespace, SA, the
# auth-delegator RBAC, Service, APIService, and serving-cert Secret.
# This file swaps in the aggexp-authz image and its flag set which adds
# --policy-service-url pointing at the in-namespace policy-service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
            # APF requires listing FlowSchema/PriorityLevelConfiguration which
            # our ServiceAccount does not have RBAC for, and in a single-replica
            # lab AA it provides no value. Disable it.
            - --enable-priority-and-fairness=false
            - --policy-service-url=http://policy-service.aggexp-system.svc/authorize
            - --policy-service-timeout=2s
            - --v=2
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
