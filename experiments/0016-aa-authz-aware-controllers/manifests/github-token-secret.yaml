# GitHub PAT for the AA to call the GitHub REST API with. Optional
# but rate-limit-avoiding. Populated via envsubst of ${GITHUB_TOKEN}
# when hack/deploy.sh runs. If GITHUB_TOKEN is empty at deploy time
# the Secret is created with an empty token; the AA then falls back
# to unauthenticated requests (60/hr, shared across public repos).
#
# The token never appears in git history because deploy/certs/ and
# this Secret's rendered form are not committed.
apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: aggexp-system
type: Opaque
stringData:
  token: "${GITHUB_TOKEN}"
