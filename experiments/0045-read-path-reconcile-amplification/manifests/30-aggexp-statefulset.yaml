# Single-replica StatefulSet. 0045 is about read paths, not
# cross-replica consistency, so one replica suffices. The HOSTNAME env
# (= pod name) is the replicaID, kept for log readability. Replaces
# the base 1-replica Deployment from deploy/manifests (deleted first
# in hack/deploy.sh).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  serviceName: aggexp-pod
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
            - --enable-priority-and-fairness=false
            - --informer-resync=30s
            - --min-age=30s
            - --adopt=true
            - --gc=true
            - --sweep-every=60s
            - --neg-cache=false
            - --debug-addr=:8444
            - --v=2
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: https
              containerPort: 8443
            - name: debug
              containerPort: 8444
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
---
# Headless service for pod-to-pod DNS.
apiVersion: v1
kind: Service
metadata:
  name: aggexp-pod
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  clusterIP: None
  selector:
    app: aggexp
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
# Debug service fronting the :8444 metrics/sweep endpoint, reached via
# kubectl port-forward in the scenarios.
apiVersion: v1
kind: Service
metadata:
  name: aggexp-debug
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  type: ClusterIP
  selector:
    app: aggexp
  ports:
    - name: debug
      port: 8444
      targetPort: 8444
      protocol: TCP
