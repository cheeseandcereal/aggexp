# APIDefinition CRD — cluster-scoped declarative handle for an AA
# served by the 0027 multiplex middleware.
#
# The CRD schema encodes the fields thesis.APIDefinition commits to:
# group/version/kind/plural/singular/scope, schemaSource + schema,
# backend.transport + backend.address, watchCapability. Status
# fields are written by the reconciler.
#
# Naming convention for CR names: "<plural>.<group>" (matches how
# Kubernetes names CRDs). Example: "widgets.aggexp.io".
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apidefinitions.aggexp.io
spec:
  group: aggexp.io
  scope: Cluster
  names:
    kind: APIDefinition
    listKind: APIDefinitionList
    singular: apidefinition
    plural: apidefinitions
    shortNames: ["apidef"]
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: |
            APIDefinition declares an aggregated API the 0027
            multiplex middleware should serve. The reconciler watches
            these, registers/deregisters APIService objects +
            internal handlers, and writes status back.
          required: ["spec"]
          properties:
            apiVersion: { type: string }
            kind:       { type: string }
            metadata:   { type: object }
            spec:
              type: object
              required: ["group", "version", "kind", "plural", "singular", "scope", "backend"]
              properties:
                group:
                  type: string
                  description: APIGroup of the exposed resource (e.g. "widgets.aggexp.io").
                version:
                  type: string
                  description: APIVersion (e.g. "v1").
                kind:
                  type: string
                  description: CamelCase Kind (e.g. "Widget").
                plural:
                  type: string
                  description: Lowercase plural (e.g. "widgets").
                singular:
                  type: string
                  description: Lowercase singular (e.g. "widget").
                scope:
                  type: string
                  enum: ["Namespaced", "Cluster"]
                  description: Resource scope.
                schemaSource:
                  type: string
                  enum: ["backendOpenAPI", "backendJSONSchema", "configEmbedded"]
                  default: "backendJSONSchema"
                  description: |
                    Where the middleware obtains the resource's
                    OpenAPI schema. backendJSONSchema (default, per
                    0023 Track B) asks the backend for plain JSON
                    Schema and lifts it. configEmbedded reads the
                    inline .spec.schema verbatim. backendOpenAPI is
                    declared but not implemented in experiment 0027.
                schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Inline JSON Schema used when schemaSource is
                    configEmbedded. Ignored otherwise.
                backend:
                  type: object
                  required: ["transport", "address"]
                  properties:
                    transport:
                      type: string
                      enum: ["http", "grpc"]
                      default: "http"
                      description: Backend transport protocol.
                    address:
                      type: string
                      description: |
                        Backend address. For http, a URL or host:port
                        (http:// is assumed when scheme missing). For
                        grpc, host:port.
                watchCapability:
                  type: string
                  enum: ["poll", "push", "both"]
                  default: "push"
                  description: |
                    What the backend declares it can do for watch.
                    Middleware uses this to pick cheap vs expensive
                    watch mode.
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  description: |
                    Last .metadata.generation the reconciler acted on.
                registeredAPIService:
                  type: string
                  description: |
                    Name of the APIService object the middleware
                    created for this APIDefinition (e.g. "v1.aggexp.io").
                    Empty string before first successful reconcile.
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: ["type"]
                  items:
                    type: object
                    required: ["type", "status"]
                    properties:
                      type:    { type: string }
                      status:  { type: string, enum: ["True", "False", "Unknown"] }
                      reason:  { type: string }
                      message: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.group
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Backend
          type: string
          jsonPath: .spec.backend.address
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
