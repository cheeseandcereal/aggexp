# Three backend Deployments, one per demo resource kind. All use the
# same image (aggexp-backend-http:dev) with differentiated env vars.
#
# They use port 8080 internally; services expose them on their own
# ports so they don't collide.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: widget-backend
  namespace: aggexp-system
  labels: { app: widget-backend }
spec:
  replicas: 1
  selector: { matchLabels: { app: widget-backend } }
  template:
    metadata: { labels: { app: widget-backend } }
    spec:
      containers:
        - name: backend
          image: ${WIDGET_BACKEND_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - { name: RESOURCE, value: "widget" }
            - { name: PLURAL,   value: "widgets" }
            - { name: KIND,     value: "Widget" }
            - { name: GROUP,    value: "widgets.aggexp.io" }
            - { name: VERSION,  value: "v1" }
            - { name: PORT,     value: "8080" }
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests: { cpu: 10m, memory: 16Mi }
---
apiVersion: v1
kind: Service
metadata: { name: widget-backend, namespace: aggexp-system }
spec:
  selector: { app: widget-backend }
  ports: [{ name: http, port: 8080, targetPort: 8080, protocol: TCP }]
---
