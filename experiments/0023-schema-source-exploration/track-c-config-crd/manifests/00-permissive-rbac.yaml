apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aggexp-notes-permissive
rules:
  - apiGroups: ["aggexp.io"]
    resources: ["notes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aggexp-notes-permissive
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aggexp-notes-permissive
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
---
# Track C component needs to read APIDefinition CRs from the host
# cluster at startup to learn its resource schema.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aggexp-apidefinition-reader
rules:
  - apiGroups: ["aggexpapidefinition.aggexp.io"]
    resources: ["apidefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aggexp-apidefinition-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aggexp-apidefinition-reader
subjects:
  - kind: ServiceAccount
    name: aggexp
    namespace: aggexp-system
