# Hand-authored OpenAPI v3 document describing the business shape of a
# Widget resource: just the spec and status component schemas. The
# generator (cmd/oapigen) consumes this plus oapigen.yaml and emits the
# full Kubernetes-flavored Go API package (types, deepcopy, scheme
# registration, conversions, field-label conversions, openapi-gen defs).
#
# The author writes plain OpenAPI here — no Kubernetes concepts
# (apiVersion/kind/metadata, TypeMeta, GVK extensions). The generator
# adds all of that.
#
# v1 subset exercised by this document:
#   - string, string+enum, string+date-time
#   - integer (int64 default), integer+int32
#   - number (double default -> float64), number+float (-> float32)
#   - boolean
#   - array<scalar>, array<$ref>
#   - object+additionalProperties (-> map[string]T)
#   - object with properties (-> named struct)
#   - free-form object (-> map[string]interface{})
#   - $ref to a named component
#   - optional (not required, no default) -> pointer
openapi: 3.0.3
info:
  title: Widget API
  version: v1
components:
  schemas:
    WidgetSpec:
      type: object
      description: WidgetSpec is the user-writable portion of a Widget.
      required:
        - color
        - size
      properties:
        color:
          type: string
          description: Color is the widget's color. One of a fixed palette.
          enum:
            - red
            - green
            - blue
        size:
          type: integer
          format: int32
          description: Size is the widget's size in arbitrary units.
        weight:
          type: number
          format: double
          description: Weight is the widget's weight in kilograms.
        density:
          type: number
          format: float
          description: Density is the widget's density (single precision).
        replicas:
          type: integer
          format: int32
          description: Replicas is the desired replica count. Optional; nil means "unset".
        enabled:
          type: boolean
          description: Enabled toggles whether the widget is active.
        tags:
          type: array
          description: Tags is a free-form list of labels for the widget.
          items:
            type: string
        attributes:
          type: object
          description: Attributes is an arbitrary string-to-string map.
          additionalProperties:
            type: string
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        extra:
          type: object
          description: Extra is a free-form object with no fixed schema.
    Coordinates:
      type: object
      description: Coordinates is a 2D position.
      required:
        - x
        - y
      properties:
        x:
          type: integer
          format: int64
          description: X is the horizontal coordinate.
        y:
          type: integer
          format: int64
          description: Y is the vertical coordinate.
    WidgetStatus:
      type: object
      description: WidgetStatus is the observed state of a Widget.
      properties:
        observedSize:
          type: integer
          format: int32
          description: ObservedSize echoes spec.size at last observation.
        phase:
          type: string
          description: Phase is the lifecycle phase of the widget.
          enum:
            - Pending
            - Ready
            - Failed
        lastUpdated:
          type: string
          format: date-time
          description: LastUpdated is the time the status was last refreshed.
        conditions:
          type: array
          description: Conditions describe the widget's current state.
          items:
            $ref: '#/components/schemas/WidgetCondition'
    WidgetCondition:
      type: object
      description: WidgetCondition is a single status condition.
      required:
        - type
        - status
      properties:
        type:
          type: string
          description: Type is the condition type.
        status:
          type: string
          description: Status is True, False, or Unknown.
        message:
          type: string
          description: Message is a human-readable explanation.
