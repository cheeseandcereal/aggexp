# Permissive ClusterRole + binding for repos.aggexp.io. See 0003
# findings for why: kube-apiserver RBAC gates first, so to let the
# AA's custom authorizer be the effective gate we open RBAC up.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aggexp-repos-permissive
rules:
  - apiGroups: ["aggexp.io"]
    resources: ["repos"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aggexp-repos-permissive
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aggexp-repos-permissive
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
