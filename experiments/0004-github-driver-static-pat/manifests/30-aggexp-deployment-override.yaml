# Deployment overlay for experiment 0004 (github-driver-static-pat).
# The base manifests in deploy/manifests/ provide the namespace, SA,
# Service, APIService, and serving-cert Secret. This file swaps in
# the aggexp-repos image, its --github-* flags, the policy-service
# URL, and the GitHub token mount.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
            - --enable-priority-and-fairness=false
            - --policy-service-url=http://policy-service.aggexp-system.svc/authorize
            - --policy-service-timeout=2s
            - --github-owner=${GITHUB_OWNER}
            - --github-token-file=/etc/aggexp/github/token
            - --github-poll-interval=60s
            - --v=2
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
            - name: github-token
              mountPath: /etc/aggexp/github
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
        - name: github-token
          secret:
            secretName: github-token
