apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-service
  namespace: aggexp-system
  labels:
    app: policy-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-service
  template:
    metadata:
      labels:
        app: policy-service
    spec:
      containers:
        - name: policy-service
          image: ${POLICY_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --addr=:8080
            - --rules=/etc/policy/rules.json
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: rules
              mountPath: /etc/policy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
      volumes:
        - name: rules
          configMap:
            name: policy-service-rules
---
apiVersion: v1
kind: Service
metadata:
  name: policy-service
  namespace: aggexp-system
spec:
  selector:
    app: policy-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
