# ResourceMetadata CRD — cluster-scoped, shared across all AAs
# served by middleware using the 0024 pattern. One instance per
# exposed resource (regardless of exposed group or namespace).
#
# Name format: <group>.<resource>.<namespace>.<name>, with the
# literal '.' in a group replaced by '-' to keep DNS-1123 happy.
# For cluster-scoped resources the namespace segment is the literal
# '_cluster_'.
#
# The backing CRD lives under a **different APIGroup** from any
# exposed resource (here: aggexpmeta.aggexp.io, while the exposed
# Bucket is aggexp.io). This is the load-bearing design choice of
# 0024: ecosystem controllers (ArgoCD, Flux) that walk discovery
# see this CRD as a separate kind — not a per-exposed-resource
# mirror like 0010/0015's widgetstorages.aggexpstorage.aggexp.io.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcemetadatas.aggexpmeta.aggexp.io
spec:
  group: aggexpmeta.aggexp.io
  scope: Cluster
  names:
    kind: ResourceMetadata
    listKind: ResourceMetadataList
    singular: resourcemetadata
    plural: resourcemetadatas
    shortNames: ["rmeta"]
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            ResourceMetadata holds KRM metadata (uid, resourceVersion,
            creationTimestamp, labels, annotations, managedFields,
            finalizers, ownerReferences, deletionTimestamp) that an
            aggregated API middleware stitches onto backend-provided
            business data on every Get. The backing business data
            itself lives outside Kubernetes (S3, GitHub, a backend
            service, etc.) — this CRD only records the KRM overlay.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: ["resourceRef", "metadata"]
              properties:
                resourceRef:
                  type: object
                  required: ["group", "resource", "name"]
                  description: |
                    Identifies which exposed resource instance this
                    metadata belongs to.
                  properties:
                    group:
                      type: string
                      description: APIGroup of the exposed resource (e.g. "aggexp.io").
                    resource:
                      type: string
                      description: Plural resource name (e.g. "buckets").
                    namespace:
                      type: string
                      description: |
                        Namespace of the instance; empty for
                        cluster-scoped resources.
                    name:
                      type: string
                      description: Instance name.
                metadata:
                  type: object
                  description: |
                    The KRM metadata overlay. Expressed as typed
                    scalar fields where possible, and as JSON bytes
                    for complex/versioned payloads (managedFields,
                    ownerReferences) to avoid coupling this CRD's
                    schema to metav1 versions.
                  properties:
                    uid:
                      type: string
                    resourceVersion:
                      type: string
                      description: |
                        Kept as a string to match metav1 conventions.
                        The middleware prefers the wrapping
                        ResourceMetadata's own resourceVersion when
                        synthesizing responses; this field is a
                        fallback.
                    creationTimestamp:
                      type: string
                      format: date-time
                    deletionTimestamp:
                      type: string
                      format: date-time
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                    finalizers:
                      type: array
                      items:
                        type: string
                    managedFields:
                      type: string
                      description: |
                        JSON-encoded []metav1.ManagedFieldsEntry.
                        Stored as a string so the CRD's schema does
                        not pin a particular metav1 version.
                    ownerReferences:
                      type: string
                      description: |
                        JSON-encoded []metav1.OwnerReference.
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.resourceRef.group
        - name: Resource
          type: string
          jsonPath: .spec.resourceRef.resource
        - name: Namespace
          type: string
          jsonPath: .spec.resourceRef.namespace
        - name: Name
          type: string
          jsonPath: .spec.resourceRef.name
        - name: UID
          type: string
          jsonPath: .spec.metadata.uid
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
