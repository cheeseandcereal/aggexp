# CRD serving as the backing store for aggexp.io/v1 Widget. The AA
# (running in N replicas) watches and writes to this CRD via a
# shared dynamic informer. Namespace-scoped: experiment 0034
# specifies namespace-scoped resources so the per-namespace blast
# radius is observable.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgetstorages.aggexpstorage.aggexp.io
spec:
  group: aggexpstorage.aggexp.io
  scope: Namespaced
  names:
    plural: widgetstorages
    singular: widgetstorage
    kind: WidgetStorage
    shortNames:
      - wstor
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                color:
                  type: string
                size:
                  type: integer
                  format: int32
            status:
              type: object
              properties:
                observedSize:
                  type: integer
                  format: int32
