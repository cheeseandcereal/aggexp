# StatefulSet with 3 replicas. Stable pod names (aggexp-0, aggexp-1,
# aggexp-2) make per-pod Services trivial and keep replica identity
# observable in kubectl logs / kubectl exec.
#
# Replaces the base Deployment from deploy/manifests/40-deployment.yaml
# (which is also called "aggexp" — Kubernetes will not let a
# Deployment and a StatefulSet share a name in the same namespace, so
# the experiment-specific deploy step deletes the Deployment first;
# see hack/deploy-multi.sh).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aggexp
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  serviceName: aggexp-pod
  replicas: 3
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aggexp
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --tls-cert-file=/etc/aggexp/certs/tls.crt
            - --tls-private-key-file=/etc/aggexp/certs/tls.key
            - --bind-address=0.0.0.0
            - --secure-port=8443
            - --enable-priority-and-fairness=false
            - --widget-namespace=aggexp-widgets
            - --v=2
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: serving-cert
              mountPath: /etc/aggexp/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: aggexp-serving-cert
---
# Headless service for pod-to-pod DNS (pod-0.aggexp-pod.aggexp-system.svc, etc.)
apiVersion: v1
kind: Service
metadata:
  name: aggexp-pod
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  clusterIP: None
  selector:
    app: aggexp
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
# Per-pod Services for replica pinning. By flipping the APIService
# `spec.service.name` between aggexp / aggexp-0 / aggexp-1 / aggexp-2
# we can route ALL kubectl traffic to a specific replica or to the
# load-balanced pool. The selector uses statefulset.kubernetes.io/pod-name
# which the StatefulSet controller stamps on each pod.
apiVersion: v1
kind: Service
metadata:
  name: aggexp-0
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  type: ClusterIP
  selector:
    app: aggexp
    statefulset.kubernetes.io/pod-name: aggexp-0
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: aggexp-1
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  type: ClusterIP
  selector:
    app: aggexp
    statefulset.kubernetes.io/pod-name: aggexp-1
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: aggexp-2
  namespace: aggexp-system
  labels:
    app: aggexp
spec:
  type: ClusterIP
  selector:
    app: aggexp
    statefulset.kubernetes.io/pod-name: aggexp-2
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
