apiVersion: v1
kind: Namespace
metadata:
  name: aggexp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aggexp
  namespace: aggexp-system
---
# Permissive RBAC for the AA
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aggexp-permissive
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: aggexp
    namespace: aggexp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggexp
  namespace: aggexp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggexp
  template:
    metadata:
      labels:
        app: aggexp
    spec:
      serviceAccountName: aggexp
      containers:
        - name: aa
          image: ${AGGEXP_IMAGE}
          imagePullPolicy: Never
          args:
            - --tls-cert-file=/certs/tls.crt
            - --tls-private-key-file=/certs/tls.key
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: aggexp-serving-cert
---
apiVersion: v1
kind: Service
metadata:
  name: aggexp
  namespace: aggexp-system
spec:
  selector:
    app: aggexp
  ports:
    - port: 443
      targetPort: 8443
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1.widgets.aggexp.io
spec:
  group: widgets.aggexp.io
  version: v1
  groupPriorityMinimum: 1000
  versionPriority: 100
  service:
    name: aggexp
    namespace: aggexp-system
  insecureSkipTLSVerify: true
