# Async-provisioning mock. Returns 202 Accepted immediately on POST;
# simulates a 30s provision window and a 10s deprovision window.
# Source of truth for the experiment's Widget resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: async-mock
  namespace: aggexp-system
  labels:
    app: async-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: async-mock
  template:
    metadata:
      labels:
        app: async-mock
    spec:
      containers:
        - name: async-mock
          image: ${ASYNC_MOCK_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --addr=:8080
            - --provision-delay=30s
            - --delete-delay=10s
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: async-mock
  namespace: aggexp-system
spec:
  selector:
    app: async-mock
  ports:
    - name: http
      port: 80
      targetPort: 8080
